name: transcode

on:
  repository_dispatch:
    types: [transcode-video]

jobs:
  transcode:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download video from R2
        run: |
          mkdir input
          curl -L "${{ github.event.client_payload.video_url }}" -o input/video.mp4

      - name: Transcode to HLS
        run: |
          mkdir output

          ffmpeg -i input/video.mp4 \
          -vf "scale=w=720:h=-2" \
          -c:a aac -ar 48000 -c:v h264 -profile:v main \
          -crf 23 -sc_threshold 0 \
          -g 48 -keyint_min 48 \
          -hls_time 4 \
          -hls_playlist_type vod \
          -hls_segment_filename "output/segment_%03d.ts" \
          output/master.m3u8

      - name: Upload to R2
        run: |
          npm install -g @aws-sdk/client-s3

          node <<EOF
          const fs = require("fs");
          const path = require("path");
          const { S3Client, PutObjectCommand } = require("@aws-sdk/client-s3");

          const client = new S3Client({
            region: "auto",
            endpoint: process.env.R2_ENDPOINT,
            credentials: {
              accessKeyId: process.env.R2_ACCESS_KEY,
              secretAccessKey: process.env.R2_SECRET_KEY
            }
          });

          const dir = "output";
          const files = fs.readdirSync(dir);

          for (const file of files) {
            const filePath = path.join(dir, file);
            const body = fs.readFileSync(filePath);

            await client.send(new PutObjectCommand({
              Bucket: process.env.R2_BUCKET,
              Key: `videos/${process.env.USER_ID}/${process.env.VIDEO_ID}/${file}`,
              Body: body
            }));

            console.log("Uploaded:", file);
          }
          EOF

        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET: apppeepmint
          USER_ID: ${{ github.event.client_payload.user_id }}
          VIDEO_ID: ${{ github.event.client_payload.video_id }}
