name: transcode

on:
  repository_dispatch:
    types: [transcode-video]

jobs:
  transcode:
    runs-on: ubuntu-latest

    steps:

      # =====================================
      # 1. DEBUG PAYLOAD
      # =====================================
      - name: Debug Dispatch
        run: |
          echo "VIDEO URL = ${{ github.event.client_payload.video_url }}"
          echo "VIDEO ID = ${{ github.event.client_payload.video_id }}"
          echo "USER ID = ${{ github.event.client_payload.user_id }}"

      # =====================================
      # 2. FAST FFMPEG (NO INSTALL TIME)
      # =====================================
      - name: Setup FFmpeg (fast)
        uses: FedericoCarboni/setup-ffmpeg@v3

      # =====================================
      # 3. DOWNLOAD VIDEO
      # =====================================
      - name: Download Video
        run: |
          mkdir -p input

          curl -L "${{ github.event.client_payload.video_url }}" \
            -o input/video.mp4

          if [ ! -s input/video.mp4 ]; then
            echo "❌ Download failed"
            exit 1
          fi

          echo "✅ Download complete"

      # =====================================
      # 4. TRANSCODE TO HLS
      # =====================================
      - name: Transcode HLS
        run: |
          mkdir -p output

          ffmpeg -y \
            -i input/video.mp4 \
            -vf "scale=720:-2" \
            -c:v libx264 \
            -preset veryfast \
            -crf 30 \
            -c:a aac \
            -b:a 96k \
            -hls_time 4 \
            -hls_playlist_type vod \
            -hls_flags independent_segments \
            -hls_segment_filename "output/seg_%03d.ts" \
            output/master.m3u8

          echo "✅ HLS generated"

      # =====================================
      # 5. VERIFY OUTPUT
      # =====================================
      - name: Verify Output
        run: |
          ls -lah output

          if [ ! -f output/master.m3u8 ]; then
            echo "❌ master.m3u8 missing"
            exit 1
          fi

          echo "✅ Verification passed"

      # =====================================
      # 6. UPLOAD TO R2 (NO REINSTALLS)
      # =====================================
      - name: Upload HLS to R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          USER_ID: ${{ github.event.client_payload.user_id }}
          VIDEO_ID: ${{ github.event.client_payload.video_id }}

        run: |

          npm install @aws-sdk/client-s3

          node <<'EOF'

          const fs = require("fs");
          const path = require("path");
          const {
            S3Client,
            PutObjectCommand
          } = require("@aws-sdk/client-s3");

          async function upload() {

            const client = new S3Client({
              region: "auto",
              endpoint: process.env.R2_ENDPOINT,
              credentials: {
                accessKeyId: process.env.R2_ACCESS_KEY,
                secretAccessKey: process.env.R2_SECRET_KEY
              }
            });

            const files = fs.readdirSync("output");

            for (const file of files) {

              const filePath = path.join("output", file);
              const body = fs.readFileSync(filePath);

              const key =
                `videos/${process.env.USER_ID}/${process.env.VIDEO_ID}/${file}`;

              await client.send(
                new PutObjectCommand({
                  Bucket: process.env.R2_BUCKET,
                  Key: key,
                  Body: body,
                  ContentType: file.endsWith(".m3u8")
                    ? "application/vnd.apple.mpegurl"
                    : "video/mp2t"
                })
              );

              console.log("✅ Uploaded:", key);
            }
          }

          upload().catch(err => {
            console.error(err);
            process.exit(1);
          });

          EOF

      # =====================================
      # 7. UPDATE SUPABASE
      # =====================================
      - name: Update Playback URL
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          USER_ID: ${{ github.event.client_payload.user_id }}
          VIDEO_ID: ${{ github.event.client_payload.video_id }}

        run: |

          PLAYBACK_URL="$R2_PUBLIC_URL/videos/$USER_ID/$VIDEO_ID/master.m3u8"

          echo "Playback URL:"
          echo "$PLAYBACK_URL"

          curl -X PATCH \
            "$SUPABASE_URL/rest/v1/videos?id=eq.$VIDEO_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "{
              \"video_url\": \"$PLAYBACK_URL\"
            }"

          echo "✅ Supabase updated"

      # =====================================
      # 8. CLEANUP
      # =====================================
      - name: Cleanup
        run: rm -rf input output
