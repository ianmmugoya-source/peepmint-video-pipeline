name: transcode

on:
  repository_dispatch:
    types: [transcode-video]

jobs:
  transcode:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg curl

      # ===============================
      # 1. DOWNLOAD ORIGINAL VIDEO
      # ===============================
      - name: Download video
        run: |
          mkdir input
          curl -L "${{ github.event.client_payload.video_url }}" -o input/video.mp4

          if [ ! -s input/video.mp4 ]; then
            echo "Download failed"
            exit 1
          fi

      # ===============================
      # 2. LOW DATA MODE HLS ENCODING
      # ===============================
      - name: Transcode (TikTok Low Data Mode)
        run: |
          mkdir output

          ffmpeg -y -i input/video.mp4 \
            -vf "scale=720:-2" \
            -c:v libx264 -preset veryfast -crf 30 \
            -c:a aac -b:a 96k \
            -hls_time 4 \
            -hls_playlist_type vod \
            -hls_flags independent_segments \
            -hls_segment_filename "output/seg_%03d.ts" \
            output/master.m3u8

      # ===============================
      # 3. UPLOAD TO R2 (NO AWS SDK)
      # ===============================
      - name: Upload HLS to R2
        run: |
          for file in output/*; do

            echo "Uploading $file"

            curl -X PUT \
              -H "Authorization: Bearer $R2_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$file" \
              "$R2_PUBLIC_URL/videos/$USER_ID/$VIDEO_ID/$(basename $file)"

          done

        env:
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          R2_TOKEN: ${{ secrets.R2_TOKEN }}
          USER_ID: ${{ github.event.client_payload.user_id }}
          VIDEO_ID: ${{ github.event.client_payload.video_id }}

      # ===============================
      # 4. CLEANUP (OPTIONAL BUT RECOMMENDED)
      # ===============================
      - name: Cleanup
        run: rm -rf input output
